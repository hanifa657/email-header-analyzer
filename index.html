<!DOCTYPE html>
<html>

<head>

    <title>Email Header Analyzer</title>

    <style>

        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        h1 {
            color: #38bdf8;
        }

        textarea {
            width: 100%;
            max-width: 900px;
            height: 300px;
            padding: 15px;
            background-color: #1e293b;
            color: white;
            border: 1px solid #38bdf8;
            border-radius: 10px;
            font-size: 15px;
        }

        button {
            background-color: #38bdf8;
            color: black;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0ea5e9;
        }

        .result-box {
            margin-top: 30px;
            background-color: #1e293b;
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #38bdf8;
            white-space: pre-wrap;
        }

    </style>

</head>

<body>

    <h1>Email Header Analyzer</h1>

    <form method="POST">

        <textarea
        name="header"
        placeholder="Paste email headers here"></textarea>

        <br><br>

        <button type="submit">Analyze Email</button>

    </form>

    <div class="result-box">
        {{ result }}
    </div>

</body>

</html>
